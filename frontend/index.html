<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 스트레칭 로또</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
            <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 메인 (구글 스타일 히어로 레이아웃) -->
        <main class="hero">
            <img src="/logo.svg" alt="logo" class="site-logo" />
            <div class="hero-actions">
                <button id="predict-btn" class="btn btn-primary" aria-label="스트레칭 후 번호받기">스트레칭 후 번호받기</button>
            </div>
        </main>

        <!-- 고정(스티키) 히어로 아래쪽에 결과 표시 영역 -->
        <section id="prediction-section" class="prediction-section" style="display: none;">
            <div id="prediction-results" class="prediction-results" style="display: none;">
                <h3>추천 번호 세트</h3>
                <div id="number-sets" class="number-sets"></div>
                <div id="prediction-reasoning" class="reasoning"></div>
            </div>
        </section>

        <!-- 하단 광고 패널 -->
        <section class="ad-section">
            <div class="ad-panel">
                <video class="ad-video" autoplay muted loop playsinline preload="auto">
                    <source src="/static/Main_KR_Home.mp4" type="video/mp4" />
                </video>
            </div>
        </section>

        <!-- 로딩 오버레이 -->
        <div id="loading-overlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>분석 중...<br>
                    조금 걸릴 수 있어요 헤헤<br>
                    그래도 빨리 알려드릴게요!
                </p>
            </div>
        </div>

        <!-- 스트레칭 모달 -->
        <div id="stretch-modal" class="modal hidden" aria-hidden="true" role="dialog" aria-labelledby="stretch-modal-title">
            <div class="modal-content">
                <h3 id="stretch-modal-title">스트레칭 후 번호받기</h3>
                <p class="modal-desc">아래 영상을 1분 시청하면 [스트레칭 완료] 버튼이 활성화됩니다.</p>
                <div id="stretch-video-wrap">
                    <!-- YouTube Player가 이 div에 주입됩니다 (IFrame API) -->
                    <div id="yt-player" class="yt-player" aria-label="스트레칭 유튜브 영상"></div>
                </div>
                <div class="modal-timer">
                    <span id="watch-remaining">남은 시청 시간: 60초</span>
                </div>
                <div class="modal-actions">
                    <button id="stretch-close" class="btn" aria-label="닫기">닫기</button>
                    <button id="stretch-done" class="btn btn-primary" aria-label="스트레칭 완료" disabled>스트레칭 완료</button>
                </div>
            </div>
        </div>
    </div>

    <!-- YouTube IFrame API (가능 시 사용) -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
