<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="google-site-verification" content="pBpWaBqJleZoF5tvsUffoQM5D3ZEPzLQkNMqHrmlegw" />
	<title>스트레칭 로또</title>
	<meta name="description" content="스트레칭하고 로또 번호 받아가세요!">
	<link rel="canonical" href="https://jinlotto.onrender.com/">
	<meta property="og:title" content="스트레칭 로또">
	<meta property="og:description" content="스트레칭 로또">
	<meta property="og:url" content="https://jinlotto.onrender.com/">
	<meta property="og:type" content="website">
    <link rel="icon" href="/favicon.ico" sizes="any">
            <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 메인 (구글 스타일 히어로 레이아웃) -->
        <main class="hero">
            <img src="/logo.svg" alt="logo" class="site-logo" />
            <div class="hero-actions">
                <button id="predict-btn" class="btn btn-primary" aria-label="스트레칭 후 번호받기">스트레칭 후 번호받기</button>
            </div>
        </main>
        
        <!-- 우측 상단 의견 남기기 버튼 -->
        <button id="feedback-open" class="feedback-fab" aria-label="의견 남기기">의견 남기기</button>

        <!-- 고정(스티키) 히어로 아래쪽에 결과 표시 영역 -->
        <section id="prediction-section" class="prediction-section" style="display: none;">
            <div id="prediction-results" class="prediction-results" style="display: none;">
                <h3>추천 번호 세트</h3>
                <div id="number-sets" class="number-sets"></div>
                <div id="prediction-reasoning" class="reasoning"></div>
                <div class="good-luck" aria-live="polite">🍀 행운을 빌어요! 🍀</div>
            </div>
        </section>

        <!-- 하단 광고 패널 -->
        <section class="ad-section">
            <div class="ad-panel">
                <video class="ad-video" autoplay muted loop playsinline preload="auto">
                    <source src="/static/Main_KR_Home.mp4" type="video/mp4" />
                </video>
            </div>
        </section>

        <!-- 로딩 오버레이 -->
        <div id="loading-overlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>분석 중...<br>
                    조금 걸릴 수 있어요 헤헤<br>
                    그래도 빨리 알려드릴게요!
                </p>
            </div>
        </div>

        <!-- 스트레칭 모달 -->
        <div id="stretch-modal" class="modal hidden" aria-hidden="true" role="dialog" aria-labelledby="stretch-modal-title">
            <div class="modal-content">
                <button id="stretch-close" class="modal-close-x" aria-label="닫기" type="button">&times;</button>
                <h3 id="stretch-modal-title">스트레칭 후 번호 받기</h3>
                <p class="modal-desc">아래 영상을 1분 시청하면 로또 번호를 받을 수 있어요!</p>
                <div id="stretch-video-wrap">
                    <!-- YouTube Player가 이 div에 주입됩니다 (IFrame API) -->
                    <div id="yt-player" class="yt-player" aria-label="스트레칭 유튜브 영상"></div>
                </div>
                <div class="modal-timer">
                    <span id="watch-remaining">남은 시청 시간: 60초</span>
                </div>
                <div class="modal-actions">
                    <button id="stretch-done" class="btn btn-primary" aria-label="스트레칭 완료" disabled>스트레칭 완료</button>
                </div>
            </div>
        </div>

        <!-- 의견 남기기 모달 -->
        <div id="feedback-modal" class="modal hidden" aria-hidden="true" role="dialog" aria-labelledby="feedback-modal-title">
            <div class="modal-content">
                <button id="feedback-close" class="modal-close-x" aria-label="닫기" type="button">&times;</button>
                <h3 id="feedback-modal-title">의견 남기기</h3>
                <p class="modal-desc">서비스 개선을 위한 소중한 의견을 남겨주세요.</p>
                <div class="feedback-body">
                    <textarea id="feedback-input" class="feedback-input" rows="5" placeholder="의견을 입력해 주세요"></textarea>
                </div>
                <div class="modal-actions">
                    <button id="feedback-send" class="btn btn-primary" aria-label="전송">전송</button>
                </div>
            </div>
        </div>
    </div>

    <!-- YouTube IFrame API (영상 주입 및 재생 상태 이벤트 처리) -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
