services:
  - type: web
    name: jinlotto
    env: python
    plan: free
    autoDeploy: true
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      python build_frontend.py
    startCommand: |
      gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --worker-class uvicorn.workers.UvicornWorker --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: SLACK_WEBHOOK_URL
        sync: false

  - type: cron
    name: lotto-weekly-update
    schedule: "0 23 * * 0" # 매주 일요일 23:00 UTC = 월요일 08:00 KST
    env: python
    region: oregon
    command: python backend/batch_update.py

