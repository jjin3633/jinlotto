name: Supabase Predictions Summary

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 00:00 UTC
  workflow_dispatch:

jobs:
  run-prediction:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if python -m pip install supabase-py; then echo "installed supabase-py"; else
            echo "supabase-py not available, trying supabase";
            python -m pip install supabase;
          fi

      - name: Run Supabase summary script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python tools/supabase_predict_summary.py

      - name: Notify Slack (optional)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          OUTPUT=$(python tools/supabase_predict_summary.py)
          if [ $? -eq 0 ]; then \
            LATEST=$(echo "$OUTPUT" | python -c 'import sys, json; d = json.load(sys.stdin); print(d.get("latest_draw", ""))') ; \
            COUNTS_STR=$(echo "$OUTPUT" | python -c 'import sys, json; d = json.load(sys.stdin); c = d.get("counts", {}); print("{} {} {} {} {}".format(int(c.get("1",0)), int(c.get("2",0)), int(c.get("3",0)), int(c.get("4",0)), int(c.get("5",0))))') ; \
            MSG="✅ Supabase Predictions Summary 완료 (UTC)\\n최신회차: ${LATEST}\\n1등: ${COUNTS_STR%% *}, 2등: ${COUNTS_STR#* }"; \
            curl -sS -X POST -H 'Content-type: application/json' --data "{\"text\":\"$MSG\"}" "$SLACK_WEBHOOK_URL"; \
          else \
            echo "summary failed"; \
          fi